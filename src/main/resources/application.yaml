spring:
  application:
    name: cryptoaggregate
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  datasource:
    url: jdbc:h2:file:~/test
    username: sa
    password: password
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

resilience4j.ratelimiter:
  instances:
    coinbaseLimit:
      limitForPeriod: 10
      limitRefreshPeriod: 1s
      timeoutDuration: 5s